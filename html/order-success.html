<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен — Adriano Coffee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/order-success.css">
</head>
<body>

<header class="success-header">
    <a href="menuuser.html" class="logo-link">
        <img src="/images/logo.png" alt="Adriano Coffee">
    </a>
</header>

<main class="success-main">

    <!-- Анимация успеха -->
    <div class="success-hero">
        <div class="success-circle">
            <i class="fas fa-check"></i>
        </div>
        <h1>Заказ оформлен!</h1>
        <p class="success-subtitle">Оплата прошла успешно. Ожидайте подтверждения.</p>
    </div>

    <!-- Загрузка -->
    <div id="loading-state" class="loading-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Загружаем детали заказа...</p>
    </div>

    <!-- Детали заказа -->
    <div id="order-details" style="display:none;">

        <!-- Номер и статус -->
        <div class="order-meta-card">
            <div class="order-meta-row">
                <span class="meta-label">Номер заказа</span>
                <span class="meta-value order-id-value" id="order-number">—</span>
            </div>
            <div class="order-meta-row">
                <span class="meta-label">Статус</span>
                <span class="meta-value"><span class="status-badge" id="order-status">—</span></span>
            </div>
            <div class="order-meta-row">
                <span class="meta-label">Дата</span>
                <span class="meta-value" id="order-date">—</span>
            </div>
        </div>

        <!-- Адрес доставки -->
        <div class="detail-card">
            <div class="detail-card-title">
                <i class="fas fa-map-marker-alt"></i> Адрес доставки
            </div>
            <p id="order-address" class="detail-text">—</p>
        </div>

        <!-- Состав заказа -->
        <div class="detail-card">
            <div class="detail-card-title">
                <i class="fas fa-utensils"></i> Состав заказа
            </div>
            <div id="order-items" class="order-items-list"></div>
        </div>

        <!-- Итого -->
        <div class="total-card">
            <div id="points-used-row" class="total-row bonus-row" style="display:none;">
                <span><i class="fas fa-star"></i> Оплачено баллами</span>
                <span id="points-used-amount" class="bonus-amount">— сом</span>
            </div>
            <div class="total-row main-total">
                <span>Итого оплачено</span>
                <span id="order-total" class="total-amount">— сом</span>
            </div>
            <div id="bonus-earned-row" class="bonus-earned-banner" style="display:none;">
                <i class="fas fa-star"></i>
                За этот заказ вам начислят <strong id="bonus-earned-amount">0</strong> баллов после доставки
            </div>
        </div>

    </div>

    <!-- Навигация -->
    <div class="success-actions">
        <a href="menuuser.html" class="btn-menu">
            <i class="fas fa-utensils"></i> Вернуться в меню
        </a>
        <a href="dashboard.html" class="btn-orders">
            <i class="fas fa-clipboard-list"></i> Мои заказы
        </a>
    </div>

</main>

<script src="/js/config.js"></script>
<script src="/js/order-success.js"></script>
</body>
</html>
