<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы - Adriano Coffee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/admin-dashboard.css">
    <link rel="stylesheet" href="/css/admin-orders.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
<!-- Хедер -->
<header class="header">
    <div class="logo">
        <img src="/images/logo.png" alt="Логотип" />
    </div>
    <nav class="nav">
        <a href="admin-menu.html">Меню</a>
        <a href="admin-dashboard.html#adddish">Добавить блюдо</a>
        <a href="admin-dashboard.html#users">Пользователи</a>
        <a href="admin-orders.html" class="active">Заказы</a>
        <a href="admin-statistics.html">Статистика</a>
        <a href="admin-dashboard.html"><i class="fas fa-user"></i></a>
        <a href="#" id="logout-button">Выйти</a>
    </nav>
</header>

<!-- Секция заказов -->
<section class="admin-section">
    <h2><i class="fas fa-clipboard-list"></i> Управление заказами</h2>

    <!-- Фильтры -->
    <div class="orders-controls">
        <div class="filter-panel">
            <label class="filter-label">Фильтр по статусу:</label>
            <select id="statusFilter" class="status-select">
                <option value="ALL">Все заказы</option>
                <option value="PENDING">Ожидают подтверждения</option>
                <option value="CONFIRMED">Подтверждённые</option>
                <option value="PREPARING">Готовятся</option>
                <option value="READY">Готовы</option>
                <option value="DELIVERED">Доставлены</option>
                <option value="CANCELLED">Отменённые</option>
            </select>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div>
                    <span class="stat-value" id="pendingCount">0</span>
                    <span class="stat-label">Ожидают</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <span class="stat-value" id="confirmedCount">0</span>
                    <span class="stat-label">Подтверждено</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-box"></i>
                <div>
                    <span class="stat-value" id="totalCount">0</span>
                    <span class="stat-label">Всего</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Список заказов -->
    <div id="orders-container" class="orders-container">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Загрузка заказов...</p>
        </div>
    </div>
</section>

<!-- Модальное окно деталей заказа -->
<div id="order-details-modal" class="modal">
    <div class="modal-content order-details-content">
        <span class="close" id="close-order-modal">&times;</span>
        <div id="order-details-body">
            <!-- Детали заказа загружаются через JS -->
        </div>
    </div>
</div>

<!-- Футер -->
<footer class="footer">
    <div class="footer-content">
        <div class="social-left">
            <a href="https://www.instagram.com/adriano_coffee" class="social-icon">
                <img src="/images/instagram.png" alt="Instagram">
            </a>
            <span class="small-text">adriano_coffee</span>
        </div>
        <div class="footlogo">
            <img src="/images/logo.png" alt="Логотип" />
        </div>
        <div class="social-right">
            <a href="https://wa.me/996555707083" class="social-icon">
                <img src="/images/whatsapp.png" alt="WhatsApp">
            </a>
            <span class="small-text">+996 555 707 083</span>
        </div>
    </div>
</footer>

<!-- Подключаем скрипты -->
<script src="/js/admin-orders.js"></script>
</body>
</html>
