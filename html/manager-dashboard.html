<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель менеджера - Adriano Coffee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/manager-dashboard.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
<!-- Хедер -->
<header class="header">
    <div class="logo">
        <img src="/images/logo.png" alt="Логотип" />
    </div>
    <nav class="nav">
        <a href="manager-menu.html">Меню</a>
        <a href="#adddish">Добавить блюдо</a>
        <a href="manager-orders.html">Заказы</a>
        <a href="manager-dashboard.html"><i class="fas fa-user"></i></a>
        <a href="#" id="logout-button">Выйти</a>
    </nav>
</header>

<!-- Секция менеджера -->
<section class="admin-section">
    <h2>Панель менеджера</h2>

    <!-- Форма добавления блюда -->
    <div class="add-dish" id="adddish">
        <h3>Добавить новое блюдо</h3>
        <form id="addDishForm">
            <div class="form-group">
                <label for="dishName">Название блюда:</label>
                <input type="text" id="dishName" name="dishName" required>
            </div>
            <div class="form-group">
                <label for="dishCategory">Категория:</label>
                <select id="dishCategory" name="dishCategory" required>
                    <option value="COFFEE">Кофе</option>
                    <option value="BREAKFAST">Завтраки</option>
                    <option value="SALADS">Салаты</option>
                    <option value="SOUPS">Супы</option>
                    <option value="PASTAS">Паста</option>
                    <option value="HOTDISHES">Горячие блюда</option>
                    <option value="BOWLS">Боулы</option>
                    <option value="DESSERTS">Десерты</option>
                    <option value="TEAS">Чаи</option>
                    <option value="DRINKS">Напитки</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dishDescription">Описание:</label>
                <textarea id="dishDescription" name="dishDescription" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="dishPrice">Цена (сом):</label>
                <input type="number" id="dishPrice" name="dishPrice" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="dishVolume">Объем (мл/гр):</label>
                <input type="number" id="dishVolume" name="dishVolume" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="dishImage">Изображение:</label>
                <input type="file" id="dishImage" name="dishImage" accept="image/*">
            </div>
            <button type="submit" class="btn">Добавить блюдо</button>
        </form>
        <div id="addDishMessage" class="response-message"></div>
    </div>
</section>

<!-- Футер -->
<footer class="footer">
    <div class="footer-content">
        <div class="social-left">
            <a href="https://www.instagram.com/adriano_coffee" class="social-icon">
                <img src="/images/instagram.png" alt="Instagram">
            </a>
            <span class="small-text">adriano_coffee</span>
        </div>
        <div class="footlogo">
            <img src="/images/logo.png" alt="Логотип" />
        </div>
        <div class="social-right">
            <a href="https://wa.me/996555707083" class="social-icon">
                <img src="/images/whatsapp.png" alt="WhatsApp">
            </a>
            <span class="small-text">+996 555 707 083</span>
        </div>
    </div>
</footer>

<script src="/js/manager-dashboard.js"></script>
</body>
</html>
